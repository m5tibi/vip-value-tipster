<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIP Fogadás Elemző</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0c0e14;color:#e2e8f0;font-family:'Inter',system-ui,sans-serif;min-height:100vh}
    .hdr{background:linear-gradient(135deg,#1a1d2e,#12141f);border-bottom:1px solid #2a2d3e;padding:16px 22px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
    .htitle{font-size:19px;font-weight:800;background:linear-gradient(90deg,#a78bfa,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .hsub{font-size:11px;color:#6b7280;margin-top:2px}
    .hright{display:flex;align-items:center;gap:8px}
    .bdg{display:flex;align-items:center;gap:5px;border-radius:20px;padding:5px 11px}
    .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
    .back{background:#1a1d2e;border:1px solid #2a2d3e;border-radius:8px;padding:7px 13px;font-size:12px;font-weight:600;color:#94a3b8;text-decoration:none}
    .tabs{display:flex;gap:4px;padding:12px 22px 0;border-bottom:1px solid #1e2130}
    .body{padding:20px 22px;max-width:700px;margin:0 auto}
    .card{background:#12141f;border:1px solid #1e2130;border-radius:12px;padding:18px;margin-bottom:14px}
    .lbl{font-size:11px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;display:block}
    .inp{width:100%;background:#1a1d2e;border:1px solid #2a2d3e;border-radius:8px;padding:10px 14px;color:#e2e8f0;font-size:14px;outline:none}
    .inp::placeholder{color:#4b5563}
    .textarea{width:100%;background:#1a1d2e;border:1px solid #2a2d3e;border-radius:10px;padding:14px;color:#e2e8f0;font-size:15px;outline:none;resize:vertical;min-height:90px;line-height:1.6;font-family:inherit}
    .textarea::placeholder{color:#4b5563}
    .textarea:focus{border-color:#7c3aed55}
    .btn{border:none;border-radius:9px;font-weight:700;cursor:pointer}
    .btn-p{background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff}
    .btn-off{background:#1e2130;color:#4b5563;cursor:not-allowed}
    .btn-del{background:#1f0707;border:1px solid #f8717133;color:#f87171}
    .bfull{width:100%;padding:14px;font-size:15px}
    .bsm{padding:9px 14px;font-size:13px}
    .example{display:inline-flex;align-items:center;gap:6px;background:#1a1d2e;border:1px solid #2a2d3e;border-radius:20px;padding:5px 12px;font-size:12px;color:#94a3b8;cursor:pointer;margin:4px 4px 4px 0;transition:all .15s}
    .example:hover{border-color:#7c3aed55;color:#e2e8f0}
    .aitext{font-size:14px;line-height:1.8;color:#cbd5e1;white-space:pre-wrap}
    .div{border-top:1px solid #1e2130;padding-top:14px;margin-top:4px}
    .fbw{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px}
    .vbdg{display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:5px 14px;font-size:13px;font-weight:700}
    .kmask{background:#1a1d2e;border-radius:8px;padding:10px 14px;font-family:monospace;font-size:13px;color:#6b7280;letter-spacing:1px;margin-bottom:12px}
    .pwrap{position:relative}
    .ptgl{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:#6b7280;cursor:pointer;font-size:16px}
    .imono{font-family:monospace;font-size:13px;padding-right:44px}
    .ob{max-width:480px;margin:0 auto;padding:24px 22px}
    .step{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px}
    .snum{width:24px;height:24px;border-radius:50%;background:#7c3aed22;border:1px solid #7c3aed55;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#a78bfa;flex-shrink:0}
    @media(max-width:600px){.body{padding:14px 16px}}
  </style>
</head>
<body>
<div id="root"></div>
<script>
var KS='vbt_claude_key', HS='vbt_ah2';
var S={
  screen:'loading', tab:'analyzer',
  claudeKey:'', keyIn:'', savingKey:false, keyMsg:null,
  query:'', loading:false, result:null,
  history:[], expanded:null
};

var EXAMPLES=[
  'Belgium - Szenegál; mindkét csapat szerez gólt + Over 2.5',
  'Brazília - Argentína; hazai győzelem',
  'Real Madrid - Barcelona; Over 3.5 gól',
  'Franciaország - Marokkó; döntetlen vagy hazai győzelem'
];

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function mk(k){return k.slice(0,14)+'••••••••••••••••'+k.slice(-4);}
function simpleHash(s){var h=0;for(var i=0;i<s.length;i++){h=Math.imul(31,h)+s.charCodeAt(i)|0;}return Math.abs(h).toString(36);}
function getUid(){return S.claudeKey?simpleHash(S.claudeKey):'';}

function tabSt(name){
  var a=S.tab===name;
  return 'style="padding:8px 15px;font-size:13px;font-weight:600;border:none;border-radius:8px 8px 0 0;cursor:pointer;background:'+(a?'#1e2130':'transparent')+';color:'+(a?'#a78bfa':'#6b7280')+'"';
}

function R(){
  document.getElementById('root').innerHTML=(S.screen==='onboarding')?rOnboard():rApp();
}

window.addEventListener('DOMContentLoaded',function(){
  var k=localStorage.getItem(KS);
  var h=localStorage.getItem(HS);
  if(k) S.claudeKey=k;
  if(h){try{S.history=JSON.parse(h);}catch(e){}}
  S.screen=k?'app':'onboarding';
  R();
  if(k) syncHistory();
});

function syncHistory(){
  var uid=getUid(); if(!uid)return;
  fetch('/api/analyzer-history?uid='+uid).then(function(r){return r.json();}).then(function(d){
    if(Array.isArray(d)&&d.length){S.history=d;localStorage.setItem(HS,JSON.stringify(d));R();}
  }).catch(function(){});
}

function saveEntry(entry){
  var uid=getUid(); if(!uid)return;
  fetch('/api/analyzer-history',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({uid:uid,entry:entry})
  }).catch(function(){});
}

function clearServerHistory(){
  var uid=getUid(); if(!uid)return;
  fetch('/api/analyzer-history?uid='+uid,{method:'DELETE'}).catch(function(){});
}

function saveKey(){
  if(!S.keyIn.trim()){S.keyMsg='error';R();return;}
  S.savingKey=true;S.keyMsg=null;R();
  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':S.keyIn,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:10,messages:[{role:'user',content:'Hi'}]})
  }).then(function(r){
    if(r.ok){localStorage.setItem(KS,S.keyIn);S.claudeKey=S.keyIn;S.keyIn='';S.keyMsg='ok';if(S.screen==='onboarding'){S.screen='app';syncHistory();}}
    else S.keyMsg='error';
    S.savingKey=false;R();
  }).catch(function(){S.keyMsg='error';S.savingKey=false;R();});
}

function delKey(){localStorage.removeItem(KS);S.claudeKey='';S.keyIn='';S.keyMsg=null;R();}

function setQuery(q){S.query=q;R();setTimeout(function(){var el=document.getElementById('q-input');if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length);}},50);}

function analyze(){
  if(!S.claudeKey){alert('Kérlek add meg a Claude API kulcsodat a Beállítások fülön!');return;}
  if(S.loading)return;
  var q=S.query.trim();
  if(!q){alert('Kérlek írj be egy meccset és fogadási opciót!');return;}
  S.loading=true;S.result=null;R();

  var prompt=
    'Te egy profi labdarúgás-fogadási elemző vagy. A felhasználó az alábbi fogadási opciót szeretné elemeztetni:\n\n'+
    '"'+q+'"\n\n'+
    'Feladatod:\n'+
    '1. Azonosítsd be pontosan a meccset és a fogadási opció(ka)t\n'+
    '2. Keress rá a legfrissebb információkra: jelenlegi forma, egymás elleni előzmények (H2H), sérülések, eltiltások, motiváció, torna-kontextus\n'+
    '3. Elemezd ki részletesen, hogy a fogadási opció mennyire valószínű\n'+
    '4. Adj egyértelmű javaslatot pontosan ebben a formában (a sor elején): ✅ AJÁNLOTT / ⚠️ BIZONYTALAN / ❌ NEM AJÁNLOTT\n'+
    '5. Írj 3-5 mondatos tömör, tényszerű indoklást valós adatok alapján\n\n'+
    'Fontos: csak labdarúgásra válaszolj. Magyar nyelven, szakszerűen és tömören.';

  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':S.claudeKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:2000,tools:[{type:'web_search_20250305',name:'web_search'}],messages:[{role:'user',content:prompt}]})
  }).then(function(r){return r.json();}).then(function(d){
    var texts=d.content?d.content.filter(function(x){return x.type==='text';}):[]; 
    var ai=texts.length?texts[texts.length-1].text:'Elemzés sikertelen — ellenőrizd a Claude API kulcsodat.';
    var entry={id:Date.now(),ts:new Date().toLocaleString('hu-HU'),query:q,ai:ai};
    S.result=entry;
    S.history=[entry].concat(S.history).slice(0,50);
    localStorage.setItem(HS,JSON.stringify(S.history));
    saveEntry(entry);
    S.loading=false;R();
  }).catch(function(e){
    console.error(e);
    S.result={error:true,msg:'Hálózati hiba. Ellenőrizd a Claude API kulcsodat.'};
    S.loading=false;R();
  });
}

// ── Render ────────────────────────────────────────────────
function rHdr(){
  return '<div class="hdr"><div><div class="htitle">⚡ VIP Fogadás Elemző</div><div class="hsub">AI-alapú meccs elemzés · BYOK</div></div>'+
    '<div class="hright">'+
    (S.claudeKey?'<div class="bdg" style="background:#0a3b1a;border:1px solid #4ade8033"><div class="dot" style="background:#4ade80"></div><span style="font-size:11px;color:#4ade80;font-weight:600">Claude ✓</span></div>':'')+
    '<a class="back" href="/">← Főoldal</a></div></div>';
}

function rOnboard(){
  var steps=[['1','Menj a console.anthropic.com oldalra'],['2','Regisztrálj ingyenesen (ha még nincs fiókod)'],['3','API Keys → Create Key gomb'],['4','Másold ki a kulcsot — ⚠️ csak egyszer látható!'],['5','Mentsd el azonnal egy biztonságos helyre'],['6','Illeszd be az alábbi mezőbe']];
  var sh='';for(var i=0;i<steps.length;i++)sh+='<div class="step"><div class="snum">'+steps[i][0]+'</div><div style="font-size:13px;color:#cbd5e1;padding-top:4px">'+steps[i][1]+'</div></div>';
  return rHdr()+'<div class="ob">'+
    '<div class="card" style="border-color:#7c3aed44;margin-bottom:18px">'+
    '<div style="font-size:16px;font-weight:700;margin-bottom:8px">👋 Üdvözöllek!</div>'+
    '<div style="font-size:14px;color:#94a3b8;line-height:1.65">Ez az elemző a <strong style="color:#e2e8f0">saját Claude API kulcsoddal</strong> működik. Bármilyen meccset és fogadási opciót beírhatsz — a Claude rákeresz és elvégzi az elemzést.</div></div>'+
    '<div class="card" style="margin-bottom:18px"><div style="font-size:12px;font-weight:700;color:#a78bfa;margin-bottom:14px;text-transform:uppercase;letter-spacing:.5px">Hogyan szerezz API kulcsot?</div>'+sh+'</div>'+
    '<div class="card"><label class="lbl">Claude API Kulcs</label>'+
    '<div class="pwrap"><input id="ob-key" class="inp imono" type="password" placeholder="sk-ant-api03-..." oninput="S.keyIn=this.value;S.keyMsg=null"><button class="ptgl" onclick="pwt(\'ob-key\',this)">👁️</button></div>'+
    (S.keyMsg==='ok'?'<div style="margin-top:8px;font-size:12px;color:#4ade80">✅ Kulcs érvényes!</div>':'')+
    (S.keyMsg==='error'?'<div style="margin-top:8px;font-size:12px;color:#f87171">❌ Érvénytelen kulcs.</div>':'')+
    '<button class="btn bfull '+(S.keyIn&&!S.savingKey?'btn-p':'btn-off')+'" style="margin-top:14px" onclick="saveKey()">'+
    (S.savingKey?'⏳ Ellenőrzés...':'🔑 Kulcs tesztelése és mentése')+'</button>'+
    '<div style="margin-top:12px;font-size:11px;color:#4b5563;text-align:center;line-height:1.5">🔒 Csak a böngésződben tárolódik. Soha nem kerül a szerverre.</div>'+
    '</div></div>';
}

function rAnalyzer(){
  var canGo=!!S.claudeKey&&!S.loading;
  var html=

  // Beviteli kártya
  '<div class="card" style="border-color:#7c3aed33">'+
  '<label class="lbl">Meccs és fogadási opció</label>'+
  '<textarea id="q-input" class="textarea" placeholder="Pl.: Belgium - Szenegál; mindkét csapat szerez gólt + Over 2.5&#10;Pl.: Real Madrid - Barcelona; hazai győzelem&#10;Pl.: Franciaország - Marokkó; döntetlen" oninput="S.query=this.value">'+esc(S.query)+'</textarea>'+

  // Példák
  '<div style="margin-top:10px">'+
  '<span style="font-size:11px;color:#4b5563;margin-right:6px">Példák:</span>'+
  EXAMPLES.map(function(e){return '<button class="example" onclick="setQuery(\''+e.replace(/'/g,"\\'")+'\')">'+'📝 '+esc(e)+'</button>';}).join('')+
  '</div></div>'+

  // Figyelmeztetés ha nincs kulcs
  (!S.claudeKey?'<div class="card" style="border-color:#fbbf2433;font-size:13px;text-align:center;color:#fbbf24;margin-bottom:14px">⚠️ Claude API kulcs hiányzik — add meg a <strong>Beállítások</strong> fülön</div>':'')+

  // Elemzés gomb
  '<button class="btn bfull '+(canGo?'btn-p':'btn-off')+'" onclick="analyze()">'+
  (S.loading?'⏳ Elemzés folyamatban — keresés és elemzés...':'⚡ Elemzés indítása')+'</button>'+

  // Költség info
  '<div style="margin-top:8px;font-size:11px;color:#374151;text-align:center">💰 Egy elemzés kb. 40–50 Ft (~$0.10–0.15) a saját Anthropic számládra</div>';

  // Eredmény
  if(S.result&&!S.result.error){
    var r=S.result;
    var verdict='';
    if(r.ai.includes('✅ AJÁNLOTT')) verdict='<span class="vbdg" style="background:#4ade801a;border:1px solid #4ade8044;color:#4ade80">✅ AJÁNLOTT</span>';
    else if(r.ai.includes('⚠️ BIZONYTALAN')) verdict='<span class="vbdg" style="background:#fbbf241a;border:1px solid #fbbf2444;color:#fbbf24">⚠️ BIZONYTALAN</span>';
    else if(r.ai.includes('❌ NEM AJÁNLOTT')) verdict='<span class="vbdg" style="background:#f871711a;border:1px solid #f8717144;color:#f87171">❌ NEM AJÁNLOTT</span>';
    html+='<div class="card" style="margin-top:16px;border-color:#a78bfa33">'+
      '<div class="fbw" style="margin-bottom:12px">'+
      '<div><div style="font-size:15px;font-weight:700;color:#e2e8f0">'+esc(r.query)+'</div>'+
      '<div style="font-size:12px;color:#6b7280;margin-top:4px">'+r.ts+'</div></div>'+
      verdict+'</div>'+
      '<div class="div"><div style="font-size:11px;color:#6b7280;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">AI Elemzés</div>'+
      '<div class="aitext">'+esc(r.ai)+'</div></div></div>';
  }
  if(S.result&&S.result.error){
    html+='<div class="card" style="margin-top:14px;border-color:#f8717133;color:#f87171;font-size:14px">❌ '+(S.result.msg||'Hiba az elemzés során.')+'</div>';
  }
  return html;
}

function rHistory(){
  if(!S.history.length)return '<div style="text-align:center;color:#6b7280;padding:50px 20px;font-size:14px">Még nincs mentett elemzés.</div>';
  var html='<button class="btn btn-del bsm" style="margin-bottom:14px" onclick="if(confirm(\'Törölni az összes előzményt?\')){S.history=[];localStorage.removeItem(\''+HS+'\');clearServerHistory();R()}">🗑️ Előzmények törlése</button>';
  for(var i=0;i<S.history.length;i++){
    var h=S.history[i];
    var isExp=S.expanded===i;
    var verdict='';
    if(h.ai){
      if(h.ai.includes('✅ AJÁNLOTT')) verdict='<span style="font-size:11px;font-weight:700;background:#4ade801a;color:#4ade80;padding:2px 8px;border-radius:20px">✅ AJÁNLOTT</span>';
      else if(h.ai.includes('⚠️ BIZONYTALAN')) verdict='<span style="font-size:11px;font-weight:700;background:#fbbf241a;color:#fbbf24;padding:2px 8px;border-radius:20px">⚠️ BIZONYTALAN</span>';
      else if(h.ai.includes('❌ NEM AJÁNLOTT')) verdict='<span style="font-size:11px;font-weight:700;background:#f871711a;color:#f87171;padding:2px 8px;border-radius:20px">❌ NEM AJÁNLOTT</span>';
    }
    // Régi formátumú elemzések (query helyett match+tip)
    var title=h.query||(h.match?(h.match+(h.tip?' — '+h.tip:'')):'Elemzés');
    html+='<div class="card" style="cursor:pointer;border-color:'+(isExp?'#a78bfa44':'#1e2130')+'" onclick="S.expanded=S.expanded==='+i+'?null:'+i+';R()">'+
      '<div class="fbw"><div>'+
      '<div style="font-size:14px;font-weight:600;color:#e2e8f0">'+esc(title)+'</div>'+
      '<div style="font-size:12px;color:#6b7280;margin-top:2px">'+esc(h.ts)+'</div></div>'+
      verdict+'</div>'+
      (isExp&&h.ai?'<div class="div" style="margin-top:10px"><div class="aitext" style="font-size:13px">'+esc(h.ai)+'</div></div>':'')+
      '</div>';
  }
  return html;
}

function rSettings(){
  return '<div class="card" style="border-color:'+(S.claudeKey?'#4ade8033':'#2a2d3e')+'">'+
    '<div class="fbw" style="margin-bottom:14px">'+
    '<div style="font-size:15px;font-weight:700">🤖 Claude API kulcs</div>'+
    '<div style="display:flex;align-items:center;gap:5px;background:'+(S.claudeKey?'#0a3b1a':'#1a1d2e')+';border:1px solid '+(S.claudeKey?'#4ade8033':'#2a2d3e')+';border-radius:20px;padding:4px 10px">'+
    '<div class="dot" style="background:'+(S.claudeKey?'#4ade80':'#4b5563')+'"></div>'+
    '<span style="font-size:11px;color:'+(S.claudeKey?'#4ade80':'#4b5563')+';font-weight:600">'+(S.claudeKey?'Aktív':'Nincs beállítva')+'</span></div></div>'+
    (S.claudeKey?'<div class="kmask">'+mk(S.claudeKey)+'</div>':'')+
    '<label class="lbl">'+(S.claudeKey?'Kulcs frissítése':'API kulcs megadása')+'</label>'+
    '<div class="pwrap"><input id="st-key" class="inp imono" type="password" placeholder="sk-ant-api03-..." oninput="S.keyIn=this.value;S.keyMsg=null"><button class="ptgl" onclick="pwt(\'st-key\',this)">👁️</button></div>'+
    (S.keyMsg==='ok'?'<div style="margin-top:8px;font-size:12px;color:#4ade80">✅ Kulcs mentve!</div>':'')+
    (S.keyMsg==='error'?'<div style="margin-top:8px;font-size:12px;color:#f87171">❌ Érvénytelen kulcs.</div>':'')+
    '<button class="btn bfull bsm '+(S.keyIn&&!S.savingKey?'btn-p':'btn-off')+'" style="margin-top:12px" onclick="saveKey()">'+(S.savingKey?'⏳ Ellenőrzés...':'🔑 Kulcs mentése')+'</button>'+
    (S.claudeKey?'<button class="btn bfull btn-del bsm" style="margin-top:8px" onclick="delKey()">🗑️ Kulcs törlése</button>':'')+
    '<div style="margin-top:12px;font-size:11px;color:#4b5563;text-align:center;line-height:1.5">🔒 Csak a böngésződben tárolódik (localStorage).</div></div>'+
    '<div class="card" style="background:transparent;border-color:#1e2130">'+
    '<div style="font-size:12px;color:#4b5563;line-height:1.7">'+
    '💡 <strong style="color:#6b7280">Hogyan működik?</strong> Írj be bármilyen foci meccset és fogadási opciót szabad szövegként. A Claude AI webkereséssel rákeresz az aktuális formára, H2H előzményekre, sérülésekre — és javaslatot ad.<br><br>'+
    '💰 <strong style="color:#6b7280">Egy elemzés ára:</strong> kb. 40–50 Ft (~$0.10–0.15) a saját Anthropic számládra terhelve.'+
    '</div></div>';
}

function rApp(){
  var tabs='<div class="tabs">'+
    '<button '+tabSt('analyzer')+' onclick="S.tab=\'analyzer\';R()">🔍 Elemzés</button>'+
    '<button '+tabSt('history')+' onclick="S.tab=\'history\';R()">📋 Előzmények ('+S.history.length+')</button>'+
    '<button '+tabSt('settings')+' onclick="S.tab=\'settings\';R()">⚙️ Beállítások</button>'+
    '</div>';
  var content=S.tab==='analyzer'?rAnalyzer():S.tab==='history'?rHistory():rSettings();
  return rHdr()+tabs+'<div class="body">'+content+'</div>';
}

function pwt(id,btn){
  var el=document.getElementById(id);if(!el)return;
  el.type=(el.type==='password')?'text':'password';
  btn.textContent=(el.type==='password')?'👁️':'🙈';
}
</script>
